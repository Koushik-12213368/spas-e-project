name: Azure SQL Analytics CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r w'day/requirements.txt

      - name: Lint / basic checks
        run: |
          python -m compileall w'day/src

      - name: Apply schema and load data
        working-directory: w'day
        run: |
          python src/load_data.py

